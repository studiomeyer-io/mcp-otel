name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build first: examples/ self-import "mcp-otel", which resolves via the
      # package's own exports -> dist/. Typechecking before the build fails in a
      # clean clone (no dist/ yet). prepublishOnly already builds before typecheck.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Run example (smoke)
        run: node examples/connected-trace.mjs
